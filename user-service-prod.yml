spring:
  application:
    name: user-service
  profiles:
    active: prod
  datasource:
    url: ${DB_URL:jdbc:postgresql://user-service-db:5432/user_db}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 20
          fetch_size: 50
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    producer:
      acks: all
      retries: 3
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer

server:
  port: 8081
  servlet:
    context-path: /
  compression:
    enabled: true
    min-response-size: 1024

logging:
  level:
    root: WARN
    org.hwmoodle: INFO
    org.springframework.web: WARN
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: /var/log/user-service/app.log
    max-size: 10MB
    max-history: 30

notification-service:
  url: ${NOTIFICATION_SERVICE_URL:http://notification-service:8082}
  api-key: ${NOTIFICATION_API_KEY}
  timeout: 3000
  retry-count: 2

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  health:
    circuitbreakers:
      enabled: true
  metrics:
    enable:
      jvm: true
      process: true
      system: true

app:
  name: User Service
  version: 1.0
  env: production

